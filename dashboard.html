<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบกายภาพบำบัดสำหรับผู้ป่วยหลังเส้นเลือดสมองแตก(Stroke)</title>
    
    <!-- External Dependencies -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- User Header -->
    <div class="user-header">
        <div class="user-header-content">
            <!-- ชื่อผู้ใช้ทางซ้าย -->
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-md"></i>
                </div>
                <div class="user-details">
                    <span class="user-name" id="userName">นานาจิตตัง</span>
                    <span class="user-status">เข้าสู่ระบบแล้ว</span>
                </div>
            </div>
            
            <!-- โลโก้และไอคอนแจ้งเตือนทางขวา -->
            <div class="header-right">
                <img src="image/logoo.jpeg" alt="SmartCare Logo" class="header-logo">
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <h1>สวัสดี <span id="greetingName"></span>!</h1>
            <p class="subtitle">พร้อมเริ่มการฟื้นฟูสมรรถภาพวันนี้แล้วหรือยัง</p>
        </div>

        <!-- Section Title -->
        <h2 class="section-title">แผนการฟื้นฟูวันนี้</h2>

        <!-- Plan Info Banner -->
        <div id="planInfoBanner" class="plan-info-banner hidden">
            <div class="plan-info-left">
                <i class="fas fa-clipboard-list"></i>
                <div>
                    <div class="plan-name" id="planName">แผนการฟื้นฟู</div>
                    <div class="plan-physio" id="planPhysio">กำหนดโดย: นักกายภาพบำบัด</div>
                </div>
            </div>
            <div class="plan-progress-wrap">
                <div class="plan-progress-label">วันนี้ <span id="doneCount">0</span>/<span id="totalCount">0</span> ท่า ครบแผน</div>
                <div class="plan-progress-bar">
                    <div class="plan-progress-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>
        </div>

        <!-- Exercise List (per-set view) -->
        <div id="exerciseGrid">
            <div class="exercise-loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span>กำลังโหลดแผนการฝึก...</span>
            </div>
        </div>

        <!-- Menu Section Title -->
        <h2 class="section-title" style="margin-top: 48px;">เมนูอื่นๆ</h2>

        <!-- Bottom Navigation Icons (simplified menu) -->
        <div class="bottom-menu">
            <a href="profile-edit.html" class="menu-icon-item">
                <div class="menu-icon">
                    <i class="fas fa-user-injured"></i>
                </div>
                <span>ข้อมูลส่วนตัว</span>
            </a>

            <a href="report.html" class="menu-icon-item">
                <div class="menu-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span>รายงานการประเมิน</span>
            </a>

            <a href="contact.html" class="menu-icon-item">
                <div class="menu-icon">
                    <i class="fas fa-user-doctor"></i>
                </div>
                <span>ติดต่อผู้เชี่ยวชาญ</span>
            </a>

            <a href="#" onclick="exitSystem(); return false;" class="menu-icon-item">
                <div class="menu-icon logout">
                    <i class="fas fa-sign-out-alt"></i>
                </div>
                <span>ออกจากระบบ</span>
            </a>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>กำลังเตรียมระบบ...</p>
    </div>

    <!-- Custom JavaScript -->
    <script>
        const BASE_URL = 'https://bn1-1.onrender.com';

        // ─── ดึง token ───
        function getToken() {
            const t = localStorage.getItem('authToken') || sessionStorage.getItem('authToken')
                || localStorage.getItem('token')     || sessionStorage.getItem('token');
            if (t) return t;
            try {
                const raw = localStorage.getItem('userData') || sessionStorage.getItem('userData');
                if (raw) return JSON.parse(raw).token || '';
            } catch(e) {}
            return '';
        }

        // ─── เลือกท่าออกกำลังกาย ───
        // ✅ บันทึก key ให้ตรงกับที่ potex.js อ่าน (selectedTargetReps / selectedTargetSets)
        function selectExercise(exerciseId, exerciseName, targetReps, targetSets) {
            localStorage.setItem('selectedExercise',     exerciseId);
            localStorage.setItem('selectedExerciseName', exerciseName);
            localStorage.setItem('selectedTargetReps',   targetReps);
            localStorage.setItem('selectedTargetSets',   targetSets);
            window.location.href = `exercise-instruction.html?type=${exerciseId}`;
            // ✅ แก้: ส่ง ?type= ไปด้วย เพื่อให้ potex.js อ่านจาก URL ได้ถูกต้อง
        }

        // ─── ออกจากระบบ ───
        function exitSystem() {
            if (confirm('คุณต้องการออกจากระบบหรือไม่?')) {
                localStorage.clear(); sessionStorage.clear();
                const ov = document.getElementById('loadingOverlay');
                if (ov) { ov.classList.remove('hidden'); ov.querySelector('p').textContent = 'กำลังออกจากระบบ...'; }
                setTimeout(() => { window.location.href = 'login.html'; }, 1000);
            }
        }

        // ─── default ท่า fallback ───
        function getDefaultExercises() {
            return [
                { exercise_id: 60001, name_th: 'ยกแขนไปข้างหน้า',  exercise_type: 'arm-raise-forward', icon: 'fa-hand-paper', sets: 3, reps_per_set: 10, color: 'orange' },
                { exercise_id: 60002, name_th: 'เหยียดเข่าตรง',     exercise_type: 'leg-extension',     icon: 'fa-walking',    sets: 3, reps_per_set: 10, color: 'green'  },
                { exercise_id: 60003, name_th: 'โยกลำตัวซ้าย-ขวา', exercise_type: 'trunk-sway',        icon: 'fa-sync-alt',   sets: 3, reps_per_set: 10, color: 'teal'   }
            ];
        }

        // ─── icon/color map ───
        const iconMap = {
            'arm-raise-forward': 'fa-hand-paper',
            'leg-extension':     'fa-walking',
            'trunk-sway':        'fa-sync-alt',
            'balance':           'fa-balance-scale',
            'default':           'fa-dumbbell'
        };

        // ✅ เพิ่ม: map exercise_id → exercise_type
        // เพราะ DB เก็บ exercise_id (60001) แต่ potex.js ต้องการ string type
        const exerciseIdMap = {
            60001: 'arm-raise-forward',
            60002: 'leg-extension',
            60003: 'trunk-sway',
            60004: 'neck-tilt'
        };

        const colorList = ['orange', 'green', 'teal', 'blue', 'purple', 'pink'];

        // ─── สร้าง dots แทน set ───
        function buildSetDots(setsDone, setsTotal) {
            let html = '<div class="set-dots">';
            for (let i = 1; i <= setsTotal; i++) {
                const done = i <= setsDone;
                html += `<div class="set-dot ${done ? 'done' : ''}">
                    ${done ? '<i class="fas fa-check"></i>' : i}
                </div>`;
            }
            html += '</div>';
            return html;
        }

        // ─── render cards ───
        function renderExerciseCards(container, exercises, doneMap) {
            container.innerHTML = '';

            exercises.forEach((ex, idx) => {
                const color     = ex.color || colorList[idx % colorList.length];
                const icon      = ex.icon  || iconMap[ex.exercise_type] || iconMap['default'];
                const setsTotal = ex.sets  || 3;
                const reps      = ex.reps_per_set || 10;
                const setsDone  = doneMap[ex.exercise_id] || doneMap[ex.exercise_type] || 0;
                const allDone   = setsDone >= setsTotal;

                const card = document.createElement('div');
                card.className = `ex-plan-card color-${color} ${allDone ? 'all-done' : ''}`;
                card.onclick   = () => selectExercise(ex.exercise_type, ex.name_th, reps, setsTotal);

                card.innerHTML = `
                    <div class="ex-plan-left">
                        <div class="ex-plan-icon color-${color}">
                            <i class="fas ${icon}"></i>
                        </div>
                    </div>
                    <div class="ex-plan-body">
                        <div class="ex-plan-name">
                            ${ex.name_th}
                            ${allDone ? '<span class="done-tag"><i class="fas fa-check-circle"></i> ครบแล้ว</span>' : ''}
                        </div>
                        <div class="ex-plan-target">
                            เป้าหมายวันนี้: <strong>${setsTotal} เซต × ${reps} ครั้ง/เซต</strong>
                        </div>
                        <div class="ex-plan-progress-row">
                            ${buildSetDots(setsDone, setsTotal)}
                            <span class="sets-label">${setsDone}/${setsTotal} เซต</span>
                        </div>
                        ${ex.hold_seconds ? `<div class="ex-plan-hold"><i class="fas fa-clock"></i> ค้างท่า ${ex.hold_seconds} วินาที/ครั้ง</div>` : ''}
                        ${ex.ex_notes    ? `<div class="ex-plan-note"><i class="fas fa-sticky-note"></i> ${ex.ex_notes}</div>` : ''}
                    </div>
                    <div class="ex-plan-arrow ${allDone ? 'done-arrow' : ''}">
                        ${allDone ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-chevron-right"></i>'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ─── อัพเดต progress banner ───
        function updateProgress(exercises, doneMap) {
            let doneCount = 0;
            exercises.forEach(ex => {
                const setsDone  = doneMap[ex.exercise_id] || doneMap[ex.exercise_type] || 0;
                const setsTotal = ex.sets || 3;
                if (setsDone >= setsTotal) doneCount++;
            });
            document.getElementById('doneCount').textContent  = doneCount;
            document.getElementById('totalCount').textContent = exercises.length;
            const pct = exercises.length > 0 ? Math.round((doneCount / exercises.length) * 100) : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('planInfoBanner').classList.remove('hidden');
        }

        // ─── ดึงแผนจาก API ───
        async function loadExercisePlan() {
            const token     = getToken();
            const container = document.getElementById('exerciseGrid');

            let userData = {};
            try {
                const raw = localStorage.getItem('userData') || sessionStorage.getItem('userData') || '{}';
                userData = JSON.parse(raw);
            } catch(e) {}

            let patientId = userData?.patient_id
                        || userData?.patient?.patient_id
                        || userData?.patientId
                        || userData?.user_id;

            if (!patientId) {
                console.warn('ไม่พบ patient_id — แสดงท่า default');
                renderExerciseCards(container, getDefaultExercises(), {});
                return;
            }

            try {
                // ── ดึงแผนการฝึก ──
                const planRes  = await fetch(`${BASE_URL}/api/patients/${patientId}/exercise-plans`, {
                    headers: { Authorization: `Bearer ${token}` }
                });

                if (!planRes.ok) {
                    renderExerciseCards(container, getDefaultExercises(), {});
                    return;
                }

                const planJson = await planRes.json();
                const data     = planJson.success ? planJson.data : [];

                if (!data || data.length === 0) {
                    renderExerciseCards(container, getDefaultExercises(), {});
                    return;
                }

                // ✅ เพิ่ม: ดึงประวัติการฝึกวันนี้เพื่อสร้าง doneMap
                let doneMap = {};
                try {
                    const sessRes  = await fetch(`${BASE_URL}/api/exercise-sessions?period=1day`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const sessJson = await sessRes.json();

                    if (sessJson.success && sessJson.data) {
                        // นับจำนวน sets ที่ทำแล้วในวันนี้ แยกตาม exercise_id
                        const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
                        sessJson.data.forEach(s => {
                            const sessionDate = s.session_date
                                ? new Date(s.session_date).toISOString().slice(0, 10)
                                : '';
                            if (sessionDate === today && s.exercise_id) {
                                // ✅ แก้: นับ 1 ต่อ 1 session ไม่ใช่ actual_sets
                                doneMap[s.exercise_id] = (doneMap[s.exercise_id] || 0) + 1;
                            }
                        });
                    }
                } catch(e) {
                    console.warn('ดึงประวัติวันนี้ไม่สำเร็จ:', e);
                }

                // แปลง API response → format สำหรับ renderExerciseCards
                const exercises = data.map((ex, idx) => ({
                    exercise_id:   ex.exercise_id,
                    name_th:       ex.name_th,
                    exercise_type: ex.name_en
                                || exerciseIdMap[ex.exercise_id]
                                || String(ex.exercise_id),
                    sets:          ex.target_sets,
                    reps_per_set:  ex.target_reps,
                    icon:          iconMap[ex.name_en]
                                || iconMap[exerciseIdMap[ex.exercise_id]]
                                || iconMap['default'],
                    color:         colorList[idx % colorList.length],
                    hold_seconds:  ex.hold_seconds || null,
                    ex_notes:      ex.notes || null
                }));

                // ✅ ส่ง doneMap จริงแทน {}
                renderExerciseCards(container, exercises, doneMap);
                updateProgress(exercises, doneMap);

                if (data[0]?.plan_name) {
                    document.getElementById('planName').textContent   = data[0].plan_name;
                    document.getElementById('planPhysio').textContent = 'กำหนดโดย: นักกายภาพบำบัด';
                }

            } catch (err) {
                console.error('โหลดแผนไม่สำเร็จ:', err);
                renderExerciseCards(container, getDefaultExercises(), {});
            }
        }
        // ─── โหลดชื่อผู้ใช้ ───
        function loadUserName() {
            try {
                const raw = localStorage.getItem('userData') || sessionStorage.getItem('userData');
                if (!raw) return;
                const user = JSON.parse(raw);
                if (user.full_name) {
                    const el1 = document.getElementById('userName');
                    const el2 = document.getElementById('greetingName');
                    if (el1) el1.textContent = user.full_name;
                    if (el2) el2.textContent = user.full_name;
                }
            } catch(e) {}
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadUserName();
            loadExercisePlan();
        });
    </script>
</body>
</html>
